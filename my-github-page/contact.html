<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — My Website</title>
  <!-- Bootstrap CSS (Tutorial 4) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS (Tutorial 3) -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVIGATION (Tutorial 2) -->
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="index.html">My Website</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero" style="padding: 4rem 0;">
    <div class="container">
      <h1>Contact Me 💌</h1>
      <p>I'd love to hear from you!</p>
    </div>
  </section>

  <!-- MAIN CONTENT (Tutorial 4 - Bootstrap) -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card p-4">
          <h4 class="card-title mb-4">Get In Touch</h4>

          <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" placeholder="e.g. Jane Smith">
          </div>

          <div class="mb-3">
            <label class="form-label">Your Email</label>
            <input type="email" class="form-control" placeholder="e.g. jane@email.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="5" placeholder="Write your message here..."></textarea>
          </div>

          <p>Or email me directly at <a href="mailto:example@example.com" class="btn btn-success">example@example.com</a></p>

          <button class="btn btn-primary w-100 mt-2">Send Message 💜</button>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 My Website — Built with 💜 using GitHub Pages</p>
  </footer>

  <!-- Bootstrap JS (Tutorial 4) -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
